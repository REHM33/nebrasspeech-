<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebras | Sessions</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .editors-wrap { display: grid; grid-template-columns: 1fr; gap: 16px; transition: all 0.3s ease; }
    .show-translation { grid-template-columns: 1fr 1fr !important; }
    .translation-panel { display: none; }
    .show-translation .translation-panel { display: block; }
    @media (max-width: 768px) { .show-translation { grid-template-columns: 1fr !important; } }
  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-container">
    <div class="logo"><a href="/dashboard">Nebras</a></div>
    <nav class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/live-page">Live</a>
      <a href="/upload-page">Upload</a>
      <button id="logoutBtn" class="btn-outline" type="button">Logout</button>
    </nav>
  </div>
</header>

<main class="sessions-page">
  <div class="container">
    <section class="page-header">
      <h1>Sessions</h1>
      <p class="muted">Manage your transcriptions and translations.</p>
    </section>

    <section class="sessions-layout">
      <div class="sessions-list-panel">
        <div class="panel-header">
          <h2>Your Sessions</h2>
          <button id="refreshBtn" class="btn-outline" type="button">Refresh</button>
        </div>
        <div class="controls">
          <input id="filterInput" class="input" type="text" placeholder="Filter by title..." />
          <button id="clearFilterBtn" class="btn-outline" type="button">Clear</button>
        </div>
        <ul id="sessionsList" class="sessions-list"></ul>
        <div id="listMessageBox" class="message-box"></div>
      </div>

      <div class="session-viewer-panel">
        <div class="panel-header">
          <h2>Session Editor</h2>
          <span class="muted" id="activeSessionMeta"></span>
        </div>

        <div class="controls">
          <input id="sessionTitleInput" class="input" type="text" placeholder="Session title" />
          <button id="updateSessionBtn" class="btn-primary" type="button" disabled>Update</button>
          <button id="translateBtn" class="btn-outline" type="button">Translate</button>
          <button id="exportTxtBtn" class="btn-outline" type="button" disabled>Export TXT</button>
        </div>

        <div class="controls">
          <button id="fontMinusBtn" class="btn-outline" type="button">A-</button>
          <button id="fontPlusBtn" class="btn-outline" type="button">A+</button>
          <select id="fontFamilySelect" class="select">
            <option value="sans">Sans</option>
            <option value="serif">Serif</option>
            <option value="mono">Mono</option>
          </select>
          <button id="alignLeftBtn" class="btn-outline" type="button">Left</button>
          <button id="alignCenterBtn" class="btn-outline" type="button">Center</button>
          <button id="alignRightBtn" class="btn-outline" type="button">Right</button>
          <button id="readingModeBtn" class="btn-outline" type="button">Reading Mode</button>
        </div>

        <div class="controls">
          <select id="highlightSelect" class="select">
            <option value="hl-yellow">Yellow</option>
            <option value="hl-blue">Blue</option>
            <option value="hl-green">Green</option>
            <option value="hl-pink">Pink</option>
          </select>
          <button id="applyHighlightBtn" class="btn-outline" type="button">Highlight</button>
          <button id="cleanBtn" class="btn-outline" type="button">Clean</button>
          <button id="copyBtn" class="btn-outline" type="button">Copy</button>
          <button id="clearTextBtn" class="btn-outline" type="button">Clear</button>
        </div>

        <div class="controls">
          <input id="findInput" class="input" type="text" placeholder="Find..." />
          <button id="findBtn" class="btn-outline" type="button">Find</button>
          <button id="findNextBtn" class="btn-outline" type="button">Next</button>
          <button id="clearFindBtn" class="btn-outline" type="button">Clear Find</button>
          <input id="replaceInput" class="input" type="text" placeholder="Replace..." />
          <button id="replaceOneBtn" class="btn-outline" type="button">Replace One</button>
          <button id="replaceAllBtn" class="btn-outline" type="button">Replace All</button>
        </div>

        <div class="editors-wrap" id="editorsWrap">
          <div>
            <div class="transcript-box">
              <label class="transcript-label">Original Transcription</label>
              <div id="editor" class="rich-editor" contenteditable="true" spellcheck="false"></div>
            </div>
            <div class="controls">
              <span class="muted" id="wordCount">Words: 0</span>
              <span class="muted" id="charCount">Chars: 0</span>
            </div>
          </div>

          <div class="translation-panel" id="translationPanel">
            <div class="transcript-box">
              <label class="transcript-label">Translation</label>
              <div id="translationBox" class="rich-editor" contenteditable="true" style="background:rgba(255,243,232,0.4);" spellcheck="false"></div>
            </div>
          </div>
        </div>

        <div id="viewerMessageBox" class="message-box"></div>
      </div>
    </section>
  </div>
</main>

<footer class="footer">
  <div class="container footer-content">
    <p>© <span id="year"></span> Nebras. All rights reserved.</p>
  </div>
</footer>

<script src="js/main.js" defer></script>
<script src="js/sessions.js" defer></script>
</body>
</html>
